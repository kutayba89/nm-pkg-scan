<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Nachbar Finder App">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nachbar Finder">
    <link rel="manifest" href="manifest.json">
    <title>Nachbar Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            touch-action: pan-y;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.9;
            font-size: 13px;
        }

        .search-container {
            padding: 15px;
            background: white;
            border-bottom: 2px solid #f0f0f0;
        }

        .search-box {
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 16px 50px 16px 16px;
            font-size: 16px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: white;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
        }

        .clear-btn {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 18px;
            display: none;
        }

        .clear-btn.show {
            display: block;
        }

        .result-count {
            margin-top: 10px;
            color: #666;
            font-size: 13px;
            text-align: center;
        }

        .floors-section {
            padding: 15px;
            background: #f9f9f9;
            border-bottom: 2px solid #e0e0e0;
        }

        .floors-title {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 12px;
        }

        .floors-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        .floor-btn {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
        }

        .floor-btn.active {
            background: #667eea;
            color: white;
        }

        .floor-number {
            font-size: 18px;
            font-weight: bold;
        }

        .floor-label {
            font-size: 9px;
            opacity: 0.8;
        }

        .floor-count {
            font-size: 10px;
            margin-top: 3px;
        }

        .results {
            padding: 15px;
            min-height: 200px;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            position: relative;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-right: 80px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-box {
            background: rgba(255,255,255,0.25);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            font-size: 10px;
            opacity: 0.85;
        }

        .info-value {
            font-size: 22px;
            font-weight: bold;
        }

        .edit-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            z-index: 10001;
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        @media (max-width: 480px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .floor-count {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 Nachbar Finder</h1>
            <p>Suchen oder Etage wählen</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text"
                    id="searchInput" 
                    placeholder="Namen eingeben..."
                >
                <button class="clear-btn" id="clearBtn">×</button>
                <span class="search-icon">🔍</span>
            </div>
            <div class="result-count" id="resultCount"></div>
        </div>

        <div class="floors-section">
            <div class="floors-title">🏢 Etagen</div>
            <div class="floors-grid" id="floorsGrid"></div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">✏️ Bearbeiten</div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Etage</label>
                <input type="text" id="editFloor">
            </div>
            <div class="form-group">
                <label>Wohnung</label>
                <input type="number" id="editApartment">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="cancelBtn">Abbrechen</button>
                <button class="btn btn-save" id="saveBtn">💾 Speichern</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
