<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="NM PKG Scan App">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nachbar Finder">
    <link rel="manifest" href="manifest.json">
    <title>NM PKG Scan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 NM PKG Scan</h1>
            <p>Suchen oder Etage wählen</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text"
                    id="searchInput" 
                    placeholder="Namen eingeben..."
                >
                <button class="clear-btn" id="clearBtn">×</button>
                <span class="search-icon">🔍</span>
            </div>
            <div class="result-count" id="resultCount"></div>
        </div>

        <div class="floors-section">
            <div class="floors-title">🏢 Etagen</div>
            <div class="floors-grid" id="floorsGrid"></div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">✏️ Bearbeiten</div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Etage</label>
                <input type="text" id="editFloor">
            </div>
            <div class="form-group">
                <label>Wohnung</label>
                <input type="number" id="editApartment">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="cancelBtn">Abbrechen</button>
                <button class="btn btn-save" id="saveBtn">💾 Speichern</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
